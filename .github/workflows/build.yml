name: Build and Publish

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: # manual trigger

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        scheme: [basic, medium, full]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: gzurowski
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Get current TeX Live year
        id: texlive
        run: |
          YEAR=$(curl -sL https://mirror.ctan.org/systems/texlive/tlnet/tlpkg/texlive.tlpdb \
            | grep '^depend release/' | sed 's/depend release\///')
          echo "year=$YEAR" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-${{ matrix.scheme }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern=${{ steps.texlive.outputs.year }}-{{version}}
            type=raw,value=${{ steps.texlive.outputs.year }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && matrix.scheme == 'full' }},suffix=
            type=raw,value=${{ matrix.scheme }},enable={{is_default_branch}},suffix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TEXLIVE_SCHEME=${{ matrix.scheme }}
            TEXLIVE_YEAR=${{ steps.texlive.outputs.year }}
          cache-from: type=gha,scope=${{ matrix.scheme }}-${{ steps.texlive.outputs.year }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scheme }}-${{ steps.texlive.outputs.year }}

  description:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: gzurowski
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: gzurowski/latex-devcontainer
          readme-filepath: ./README.md
          short-description: ${{ github.event.repository.description }}
          enable-url-completion: true
